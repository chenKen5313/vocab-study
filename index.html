<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pyh_vocab-study</title>
<style>/* ============ CSS Variables & Theme ============ */
:root {
  --primary: #2563EB; --primary-light: #DBEAFE; --primary-dark: #1E40AF;
  --accent: #F59E0B; --accent-light: #FEF3C7;
  --success: #10B981; --success-light: #D1FAE5;
  --danger: #EF4444; --danger-light: #FEE2E2;
  --bg: #F1F5F9; --card: #FFFFFF; --border: #E2E8F0;
  --text: #1E293B; --text-secondary: #64748B; --text-muted: #94A3B8;
  --shadow: 0 1px 3px rgba(0,0,0,.08); --shadow-md: 0 4px 12px rgba(0,0,0,.1);
  --radius: 12px; --radius-sm: 8px; --nav-h: 60px;
}
[data-theme="dark"] {
  --primary: #3B82F6; --primary-light: #1E3A5F; --primary-dark: #93C5FD;
  --accent: #FBBF24; --accent-light: #78350F;
  --success: #34D399; --success-light: #064E3B;
  --danger: #F87171; --danger-light: #7F1D1D;
  --bg: #0F172A; --card: #1E293B; --border: #334155;
  --text: #F1F5F9; --text-secondary: #94A3B8; --text-muted: #64748B;
}

/* ============ Reset & Base ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;padding-top:var(--nav-h);padding-bottom:70px;transition:background .3s,color .3s}
input,select,textarea{font-family:inherit;font-size:1rem;outline:none;border:2px solid var(--border);border-radius:var(--radius-sm);padding:.55rem .75rem;background:var(--card);color:var(--text);transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
button{cursor:pointer;font-family:inherit;border:none;outline:none;transition:all .2s}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ============ Top Navigation ============ */
.top-nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;z-index:100;box-shadow:var(--shadow);gap:8px;overflow-x:auto}
.nav-brand{display:flex;align-items:center;gap:8px;margin-right:12px;white-space:nowrap}
.brand-icon{font-size:1.6rem}.brand-text{font-size:1.1rem;font-weight:700;color:var(--primary)}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:8px 14px;border-radius:8px;background:transparent;color:var(--text-secondary);font-size:.9rem;white-space:nowrap;font-weight:500;position:relative}
.nav-tab:hover{background:var(--primary-light);color:var(--primary)}
.nav-tab.active{background:var(--primary);color:#fff}
.nav-actions{display:flex;gap:4px;margin-left:auto}
.icon-btn{width:40px;height:40px;border-radius:50%;background:transparent;font-size:1.2rem;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{background:var(--border)}

/* ============ Mobile Bottom Nav ============ */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;padding:6px 10px;justify-content:space-around;box-shadow:0 -2px 10px rgba(0,0,0,.05)}
.mnav-tab{flex:1;padding:6px;background:transparent;font-size:1.3rem;border-radius:8px;text-align:center}
.mnav-tab.active{background:var(--primary-light)}

@media(max-width:768px){
  .nav-tabs{display:none}.nav-brand .brand-text{display:none}
  .mobile-nav{display:flex}body{padding-bottom:75px}
  .top-nav{padding:0 12px}
}

/* ============ Main Content ============ */
.main-content{max-width:1100px;margin:0 auto;padding:20px}
.tab-content{display:none;animation:fadeIn .3s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ============ Cards ============ */
.card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:16px;border:1px solid var(--border)}
.card-header{font-size:1.1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--text)}

/* ============ Stats Grid ============ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);text-align:center;border:1px solid var(--border)}
.stat-value{font-size:2.2rem;font-weight:800;color:var(--primary);line-height:1.2}
.stat-label{font-size:.85rem;color:var(--text-secondary);margin-top:4px}
.stat-card.accent .stat-value{color:var(--accent)}
.stat-card.success .stat-value{color:var(--success)}
.stat-card.danger .stat-value{color:var(--danger)}

/* ============ Buttons ============ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);font-size:.95rem;font-weight:600;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
.btn-outline:hover{background:var(--primary-light)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 14px;font-size:.85rem}
.btn-lg{padding:14px 28px;font-size:1.1rem}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ============ Word Card (Study Mode) ============ */
.word-card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-md);border:1px solid var(--border);cursor:pointer;transition:all .3s;position:relative;min-height:180px;user-select:none}
.word-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.12)}
.word-card .word-front{}
.word-card .word-text{font-size:1.8rem;font-weight:700;color:var(--primary)}
.word-card .word-pos{font-size:.9rem;color:var(--text-secondary);margin:4px 0}
.word-card .word-meaning{font-size:1.1rem;color:var(--text);margin:8px 0}
.word-card .word-back{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.word-card.flipped .word-back{display:block}
.word-card .colloc-item{padding:6px 0;font-size:.95rem;border-bottom:1px solid var(--border)}
.word-card .colloc-item:last-child{border-bottom:none}
.word-card .colloc-en{color:var(--primary);font-weight:500}
.word-card .colloc-zh{color:var(--text-secondary);margin-left:8px;font-size:.85rem}
.word-card .flip-hint{position:absolute;top:12px;right:16px;font-size:.75rem;color:var(--text-muted)}
.word-card .card-index{position:absolute;top:12px;left:16px;font-size:.75rem;color:var(--text-muted);font-weight:600}

/* ============ Dictation ============ */
.dict-input{width:100%;padding:12px 16px;font-size:1.2rem;border-radius:var(--radius);text-align:center}
.dict-feedback{padding:12px;border-radius:var(--radius-sm);text-align:center;font-weight:600;margin-top:8px;display:none}
.dict-feedback.correct{background:var(--success-light);color:#065F46;display:block}
.dict-feedback.wrong{background:var(--danger-light);color:#991B1B;display:block}
.dict-word-display{font-size:2rem;font-weight:700;text-align:center;margin:20px 0;color:var(--text)}
.dict-progress-bar{height:6px;background:var(--border);border-radius:3px;margin:12px 0;overflow:hidden}
.dict-progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}
.dict-score{text-align:center;font-size:1.2rem;font-weight:700;margin:12px 0}

/* ============ Unit Grid ============ */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:20px}
.unit-btn{padding:12px 8px;border-radius:var(--radius-sm);background:var(--card);border:2px solid var(--border);font-size:.85rem;font-weight:600;text-align:center;transition:all .2s}
.unit-btn:hover{border-color:var(--primary);background:var(--primary-light)}
.unit-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}
.unit-btn.completed{border-color:var(--success);background:var(--success-light)}
.unit-btn .unit-num{font-size:.7rem;color:var(--text-muted);display:block}

/* ============ Study Navigator ============ */
.study-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin:20px 0}
.study-nav button{width:48px;height:48px;border-radius:50%;background:var(--card);border:2px solid var(--border);font-size:1.5rem;display:flex;align-items:center;justify-content:center}
.study-nav button:hover{background:var(--primary-light);border-color:var(--primary)}
.study-position{font-size:.95rem;color:var(--text-secondary);font-weight:500;min-width:100px;text-align:center}

/* ============ Error List ============ */
.error-item{display:flex;align-items:center;padding:12px 16px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:8px;border:1px solid var(--border);gap:12px;transition:all .2s}
.error-item:hover{box-shadow:var(--shadow)}
.error-word{font-size:1.1rem;font-weight:700;color:var(--primary);min-width:100px}
.error-count{font-size:.8rem;background:var(--danger-light);color:var(--danger);padding:2px 10px;border-radius:10px;font-weight:600}
.error-actions{margin-left:auto;display:flex;gap:6px}

/* ============ Calendar Heatmap ============ */
.heatmap{display:flex;flex-wrap:wrap;gap:3px;margin:12px 0}
.heatmap-day{width:14px;height:14px;border-radius:2px;background:var(--border);position:relative;cursor:pointer}
.heatmap-day[data-level="1"]{background:#BBF7D0}
.heatmap-day[data-level="2"]{background:#4ADE80}
.heatmap-day[data-level="3"]{background:#16A34A}
.heatmap-day[data-level="4"]{background:#166534}
.heatmap-day:hover{transform:scale(1.5);z-index:2}
.heatmap-day[title]:hover::after{content:attr(title);position:absolute;bottom:120%;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:2px 8px;border-radius:4px;font-size:.7rem;white-space:nowrap}

/* ============ Progress Bar ============ */
.progress-bar{height:12px;background:var(--border);border-radius:6px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));border-radius:6px;transition:width .5s ease}
.progress-label{display:flex;justify-content:space-between;font-size:.85rem;color:var(--text-secondary)}

/* ============ Search ============ */
.search-box{width:100%;padding:14px 20px;font-size:1.2rem;border-radius:var(--radius);margin-bottom:16px}
.search-results{max-height:60vh;overflow-y:auto}
.search-item{padding:12px 16px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.search-item:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.search-item .sword{font-size:1.1rem;font-weight:700;color:var(--primary)}
.search-item .smeaning{color:var(--text-secondary);margin-left:8px}
.search-item .scollocs{font-size:.85rem;color:var(--text-muted);margin-top:4px}

/* ============ Modal ============ */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal-box{background:var(--card);border-radius:var(--radius);padding:32px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-box h3{font-size:1.3rem;margin-bottom:16px}

/* ============ Toast ============ */
.toast-container{position:fixed;top:80px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius-sm);color:#fff;font-weight:600;animation:slideIn .3s ease;box-shadow:var(--shadow-md);font-size:.9rem}
.toast.success{background:var(--success)}.toast.error{background:var(--danger)}.toast.info{background:var(--primary)}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ============ Confetti ============ */
.confetti-piece{position:fixed;width:10px;height:10px;z-index:400;animation:confettiFall 2s ease-out forwards;pointer-events:none}
@keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ============ Settings ============ */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.toggle-switch{width:48px;height:26px;background:var(--border);border-radius:13px;position:relative;cursor:pointer;transition:background .3s}
.toggle-switch.on{background:var(--primary)}
.toggle-switch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .3s}
.toggle-switch.on::after{left:25px}

/* ============ Misc ============ */
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.75rem;font-weight:600}
.badge-primary{background:var(--primary-light);color:var(--primary)}
.badge-success{background:var(--success-light);color:#065F46}
.badge-danger{background:var(--danger-light);color:#991B1B}
.badge-accent{background:var(--accent-light);color:#92400E}
.streak-flame{font-size:2rem;animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.empty-state{text-align:center;padding:40px;color:var(--text-muted)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:12px}
.flex-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mt-1{margin-top:8px}.mt-2{margin-top:16px}.mt-3{margin-top:24px}.mb-1{margin-bottom:8px}.mb-2{margin-bottom:16px}
.text-center{text-align:center}.text-sm{font-size:.85rem}.text-muted{color:var(--text-secondary)}
</style>
</head>

<script>// ============ Store Layer ============
const Store = {
  get(key, def) { try { const v = localStorage.getItem('vv_'+key); return v ? JSON.parse(v) : def; } catch(e) { return def; } },
  set(key, val) { localStorage.setItem('vv_'+key, JSON.stringify(val)); },
  remove(key) { localStorage.removeItem('vv_'+key); }
};

function initStore() {
  if (!Store.get('progress')) Store.set('progress', {});     // {wordKey: 'new'|'learning'|'mastered'}
  if (!Store.get('errors')) Store.set('errors', {});          // {wordKey: {count, lastTime, history:[]}}
  if (!Store.get('checkins')) Store.set('checkins', {});      // {dateStr: true}
  if (!Store.get('testHistory')) Store.set('testHistory', []);// [{date, score, total, mode}]
  if (!Store.get('settings')) Store.set('settings', {theme:'light', dailyWords:28, sound:false});
}

// Helper: word key = word.toLowerCase()
function wk(w) { return (typeof w === 'string') ? w.toLowerCase() : w.w.toLowerCase(); }

// ============ Toast ============
function showToast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast '+type; t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 2500);
}

// ============ Confetti ============
function confetti() {
  const colors = ['#2563EB','#F59E0B','#10B981','#EF4444','#8B5CF6','#EC4899'];
  for (let i=0; i<60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100+'vw';
    el.style.top = -(Math.random()*20)+'vh';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (1.5+Math.random()*2)+'s';
    el.style.animationDelay = Math.random()*.5+'s';
    el.style.width = (6+Math.random()*8)+'px';
    el.style.height = (6+Math.random()*8)+'px';
    el.style.borderRadius = Math.random()>.5?'50%':'0';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3000);
  }
}

// ============ Router ============
let currentTab = 'dashboard';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.mnav-tab').forEach(b => b.classList.remove('active'));

  const sec = document.getElementById('tab-'+tab);
  if (sec) sec.classList.add('active');

  document.querySelectorAll('.nav-tab[data-tab="'+tab+'"]').forEach(b => b.classList.add('active'));
  document.querySelectorAll('.mnav-tab[data-tab="'+tab+'"]').forEach(b => b.classList.add('active'));

  renderTab(tab);
  // Scroll to top
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderTab(tab) {
  switch(tab) {
    case 'dashboard': renderDashboard(); break;
    case 'study': renderStudy(); break;
    case 'dictation': renderDictation(); break;
    case 'errors': renderErrors(); break;
    case 'plan': renderPlan(); break;
    case 'stats': renderStats(); break;
    case 'search': renderSearch(); break;
  }
}

// ============ Dashboard ============
function renderDashboard() {
  const el = document.getElementById('tab-dashboard');
  const progress = Store.get('progress');
  const errors = Store.get('errors');
  const checkins = Store.get('checkins');
  const testHistory = Store.get('testHistory');
  const totalWords = VOCAB_RAW.length;
  const mastered = Object.values(progress).filter(v => v === 'mastered').length;
  const learning = Object.values(progress).filter(v => v === 'learning').length;
  const errorCount = Object.keys(errors).length;

  // Streak calculation
  const today = new Date();
  let streak = 0;
  for (let d = new Date(today); ; d.setDate(d.getDate()-1)) {
    const ds = d.toISOString().slice(0,10);
    if (checkins[ds]) streak++;
    else break;
  }

  // Today's task
  const settings = Store.get('settings');
  const dailyWords = settings.dailyWords || 28;
  const todayUnit = Math.floor(mastered / dailyWords) + 1;
  const todayUnitIdx = Math.min(todayUnit - 1, UNITS.length - 1);

  // Recent tests
  const recentTests = testHistory.slice(-5).reverse();

  el.innerHTML = `
    <h2 style="font-size:1.5rem;margin-bottom:16px">📊 学习仪表盘</h2>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">${totalWords}</div>
        <div class="stat-label">总词汇量</div>
      </div>
      <div class="stat-card success">
        <div class="stat-value">${mastered}</div>
        <div class="stat-label">已掌握</div>
      </div>
      <div class="stat-card accent">
        <div class="stat-value">${learning}</div>
        <div class="stat-label">学习中</div>
      </div>
      <div class="stat-card danger">
        <div class="stat-value">${errorCount}</div>
        <div class="stat-label">错题数</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value"><span class="streak-flame">🔥</span> ${streak}</div>
        <div class="stat-label">连续打卡天数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${Math.round(mastered/totalWords*100)}%</div>
        <div class="stat-label">掌握率</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${testHistory.length}</div>
        <div class="stat-label">完成测试次数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${UNITS.length}</div>
        <div class="stat-label">学习单元数</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">📌 今日推荐任务</div>
      <p style="margin-bottom:12px">建议学习 <strong>第 ${todayUnit} 单元</strong>（${dailyWords} 个单词），包含以下内容：</p>
      <div class="flex-row" style="margin-bottom:16px">
        ${UNITS[todayUnitIdx] ? UNITS[todayUnitIdx].words.slice(0,6).map(w => `<span class="badge badge-primary">${w.w}</span>`).join(' ') : ''}
        ${UNITS[todayUnitIdx] && UNITS[todayUnitIdx].words.length > 6 ? `<span class="badge">+${UNITS[todayUnitIdx].words.length-6} more</span>` : ''}
      </div>
      <div class="flex-row">
        <button class="btn btn-primary" onclick="switchTab('study');selectUnit(${todayUnitIdx});">📖 开始学习</button>
        <button class="btn btn-accent" onclick="switchTab('dictation');startDictation(${todayUnitIdx});">✍️ 今日默写</button>
        <button class="btn btn-outline" onclick="checkinToday()">✅ 今日打卡</button>
      </div>
    </div>

    ${recentTests.length ? `
    <div class="card">
      <div class="card-header">📝 最近测试记录</div>
      ${recentTests.map(t => `
        <div class="error-item">
          <span style="min-width:90px">${t.date}</span>
          <span class="badge badge-primary">${t.mode||'默写'}</span>
          <span style="margin-left:auto;font-weight:700">${t.score}/${t.total}</span>
          <span class="badge ${t.score/t.total>=0.8?'badge-success':t.score/t.total>=0.6?'badge-accent':'badge-danger'}">${Math.round(t.score/t.total*100)}%</span>
        </div>
      `).join('')}
    </div>` : ''}
  `;
}

function checkinToday() {
  const ds = new Date().toISOString().slice(0,10);
  const checkins = Store.get('checkins');
  if (checkins[ds]) { showToast('今日已打卡！🔥','info'); return; }
  checkins[ds] = true;
  Store.set('checkins', checkins);
  confetti();
  showToast('打卡成功！继续加油！🎉','success');
  renderDashboard();
}

// ============ Study Mode ============

let studyWordIdx = 0;

function selectUnit(idx) {
  studyUnitIdx = idx;
  studyWordIdx = 0;
  renderStudy();
}

      <div class="word-front">
        <div class="word-text">${word.w}</div>

        <div class="word-meaning">${word.m}</div>

// ============ Dictation Mode ============
let dictMode = 'en2zh'; // 'en2zh' | 'zh2en' | 'colloc'
let dictUnitIdx = 0;
let dictWords = [];
let dictIdx = 0;
let dictScore = 0;
let dictTotal = 0;
let dictAnswered = false;

function startDictation(unitIdx) {
  dictUnitIdx = unitIdx !== undefined ? unitIdx : dictUnitIdx;
  dictWords = [...UNITS[dictUnitIdx].words];
  // Shuffle
  for (let i = dictWords.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [dictWords[i],dictWords[j]] = [dictWords[j],dictWords[i]]; }
  dictIdx = 0;
  dictScore = 0;
  dictTotal = 0;
  dictAnswered = false;
  switchTab('dictation');
}

function renderDictation() {
  const el = document.getElementById('tab-dictation');
  if (dictWords.length === 0) { el.innerHTML = '<p>请先在单元学习中选择单元再开始默写</p>'; return; }
  const word = dictWords[dictIdx];
  if (!word) {
    // Dictation complete
    const pct = dictTotal > 0 ? Math.round(dictScore/dictTotal*100) : 0;
    el.innerHTML = `
      <h2 style="font-size:1.5rem;margin-bottom:16px">✍️ 默写完成！</h2>
      <div class="card text-center">
        <div style="font-size:3rem;margin:16px 0">${pct>=80?'🎉':pct>=60?'👍':'💪'}</div>
        <div class="stat-value">${dictScore}/${dictTotal}</div>
        <div class="stat-label">正确率 ${pct}%</div>
        <div class="mt-2 flex-row" style="justify-content:center">
          <button class="btn btn-primary" onclick="startDictation(${dictUnitIdx})">🔄 重新默写</button>
          <button class="btn btn-outline" onclick="switchTab('errors')">📝 查看错题</button>
        </div>
      </div>
    `;
    if (pct >= 80) confetti();
    // Record test history
    const history = Store.get('testHistory');
    history.push({date:new Date().toISOString().slice(0,10), score:dictScore, total:dictTotal, mode:dictMode, unit:UNITS[dictUnitIdx].id});
    if (history.length > 50) history.shift();
    Store.set('testHistory', history);
    // Auto check-in
    const ds = new Date().toISOString().slice(0,10);
    const checkins = Store.get('checkins');
    if (!checkins[ds]) { checkins[ds] = true; Store.set('checkins', checkins); }
    return;
  }

  let question, answerHint, inputType='text';
  switch(dictMode) {
    case 'en2zh':
      question = word.w;
      answerHint = word.m;
      break;
    case 'zh2en':
      question = word.m;
      answerHint = word.w;
      break;
    case 'colloc':
      // Pick a random collocation and blank out a word
      if (word.c.length > 0) {
        const colloc = word.c[Math.floor(Math.random()*word.c.length)];
        const parts = colloc[0].split(' ');
        const blankIdx = Math.floor(Math.random()*Math.min(parts.length, 3));
        const original = parts[blankIdx];
        parts[blankIdx] = '______';
        question = parts.join(' ');
        answerHint = original + ' (' + colloc[1] + ')';
      } else {
        question = word.w;
        answerHint = word.m;
      }
      break;
  }

  el.innerHTML = `
    <h2 style="font-size:1.5rem;margin-bottom:12px">✍️ 默写模式</h2>

    <div class="flex-row mb-2">
      <select onchange="dictMode=this.value;renderDictation()">
        <option value="en2zh" ${dictMode==='en2zh'?'selected':''}>英 → 中</option>
        <option value="zh2en" ${dictMode==='zh2en'?'selected':''}>中 → 英</option>
        <option value="colloc" ${dictMode==='colloc'?'selected':''}>搭配填空</option>
      </select>
      <span class="text-sm text-muted">Unit ${UNITS[dictUnitIdx].id}</span>
      <span class="text-sm text-muted">${dictIdx+1}/${dictWords.length}</span>
      <span class="text-sm" style="font-weight:700;color:var(--success)">✅ ${dictScore} | ❌ ${dictTotal-dictScore}</span>
    </div>

    <div class="dict-progress-bar">
      <div class="dict-progress-fill" style="width:${(dictIdx/dictWords.length)*100}%"></div>
    </div>

    <div class="card text-center">
      <div class="dict-word-display">${question}</div>
      ${word.p ? `<div class="text-muted text-sm">${word.p}</div>` : ''}
    </div>

    <div class="mt-2">
      <input type="${inputType}" class="dict-input" id="dictAnswer" placeholder="在此输入你的答案..." autocomplete="off" onkeydown="if(event.key==='Enter')submitDictAnswer()">
    </div>

    <div class="dict-feedback" id="dictFeedback"></div>

    <div class="mt-2 flex-row" style="justify-content:center">
      <button class="btn btn-primary" onclick="submitDictAnswer()" id="dictSubmitBtn">✅ 提交</button>
      <button class="btn btn-outline" onclick="skipDictWord()">⏭ 跳过</button>
    </div>

    <div id="dictCorrectAnswer" class="mt-1 text-center" style="display:none">
      <span class="text-muted">正确答案：</span>
      <span style="font-weight:700;color:var(--success);font-size:1.2rem">${answerHint}</span>
      ${word.c && word.c.length ? `<div class="mt-1 text-sm text-muted">搭配：${word.c.map(c=>c[0]).join('；')}</div>` : ''}
    </div>
  `;
  dictAnswered = false;
}

function submitDictAnswer() {
  if (dictAnswered) return;
  const input = document.getElementById('dictAnswer');
  if (!input) return;
  const answer = input.value.trim();
  if (!answer) { showToast('请输入答案','error'); return; }

  const word = dictWords[dictIdx];
  let correctAnswers = [];
  switch(dictMode) {
    case 'en2zh':
      // Split by multiple delimiters for more matching options
      correctAnswers = word.m.split(/[；;；、，,//]+/).map(s=>s.trim()).filter(Boolean);
      break;
    case 'zh2en': correctAnswers = [word.w]; break;
    case 'colloc': correctAnswers = [document.getElementById('dictCorrectAnswer')?.querySelector('span:last-child')?.textContent?.split(' (')[0] || word.w]; break;
  }

  // Check answer
  let isCorrect = false;
  let isClose = false;
  const userAnswer = dictMode === 'zh2en' ? answer.toLowerCase().trim() : answer;

  if (dictMode === 'en2zh') {
    // 1. Exact match
    isCorrect = correctAnswers.some(ca => userAnswer === ca);
    // 2. Contains match (answer contains a correct answer or vice versa)
    if (!isCorrect) {
      isCorrect = correctAnswers.some(ca => userAnswer.includes(ca) || ca.includes(userAnswer));
    }
    // 3. Bigram similarity for close semantic match
    if (!isCorrect) {
      const bestSim = Math.max(...correctAnswers.map(ca => chineseSimilarity(userAnswer, ca)));
      if (bestSim >= 0.4) isCorrect = true;
      else if (bestSim >= 0.25) isClose = true;
    }
    // 4. Any single character match for short answers (lenient)
    if (!isCorrect && !isClose && userAnswer.length <= 4) {
      const userChars = new Set([...userAnswer]);
      isClose = correctAnswers.some(ca => [...ca].some(ch => userChars.has(ch)));
    }
  } else if (dictMode === 'zh2en') {
    isCorrect = correctAnswers.some(ca => ca.toLowerCase().trim() === userAnswer);
    // Allow minor spelling variation (~1 char difference)
    if (!isCorrect) {
      isCorrect = correctAnswers.some(ca => {
        const c = ca.toLowerCase().trim();
        return levenshtein(userAnswer, c) <= Math.min(2, Math.floor(c.length * 0.3));
      });
    }
  } else {
    // colloc mode
    isCorrect = correctAnswers.some(ca => ca.toLowerCase().trim() === userAnswer.toLowerCase().trim());
  }

  dictTotal++;
  if (isCorrect) {
    dictScore++;
    document.getElementById('dictFeedback').className = 'dict-feedback correct';
    document.getElementById('dictFeedback').textContent = '✅ 正确！太棒了！';
    const progress = Store.get('progress');
    const key = wk(word);
    if (progress[key] !== 'mastered') { progress[key] = 'learning'; Store.set('progress', progress); }
  } else if (isClose) {
    dictScore++;
    document.getElementById('dictFeedback').className = 'dict-feedback correct';
    document.getElementById('dictFeedback').textContent = '👍 意思接近，也算正确！请查看标准答案。';
    const progress = Store.get('progress');
    const key = wk(word);
    if (progress[key] !== 'mastered') { progress[key] = 'learning'; Store.set('progress', progress); }
  } else {
    document.getElementById('dictFeedback').className = 'dict-feedback wrong';
    document.getElementById('dictFeedback').textContent = '❌ 错误，请记住正确答案！';
    addToErrors(word);
  }

  document.getElementById('dictCorrectAnswer').style.display = 'block';
  document.getElementById('dictSubmitBtn').disabled = true;
  dictAnswered = true;

  setTimeout(() => { dictIdx++; renderDictation(); }, 2500);
}

function skipDictWord() {
  dictIdx++;
  renderDictation();
}

function chineseSimilarity(a, b) {
  // Bigram-based similarity for better Chinese semantic matching
  if (a === b) return 1;
  if (!a || !b) return 0;
  const bigrams = s => { const r=[]; for(let i=0;i<s.length-1;i++) r.push(s.slice(i,i+2)); return new Set(r); };
  const ba = bigrams(a), bb = bigrams(b);
  if (ba.size === 0 && bb.size === 0) return 0;
  const inter = new Set([...ba].filter(x => bb.has(x)));
  return inter.size / Math.max(ba.size, bb.size);
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) => [i]);
  for (let j=0;j<=n;j++) dp[0][j] = j;
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return dp[m][n];
}

function addToErrors(word) {
  const errors = Store.get('errors');
  const key = wk(word);
  if (!errors[key]) errors[key] = {count:0, lastTime:'', history:[], word:word};
  errors[key].count++;
  errors[key].lastTime = new Date().toISOString();
  errors[key].history.push({time:errors[key].lastTime, mode:dictMode});
  if (errors[key].history.length > 20) errors[key].history.shift();
  Store.set('errors', errors);
}

  UNITS.push({id:'错题重测',title:'错题重测',words:errorWords});

        ${unitStats.map(u => `
          <div style="padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm)">
            <div class="flex-between">
              <span style="font-weight:600;font-size:.9rem">Unit ${u.id}</span>
              <span class="badge ${u.pct>=80?'badge-success':u.pct>=50?'badge-accent':'badge-danger'}">${u.pct}%</span>
            </div>
            <div class="progress-bar mt-1"><div class="progress-fill" style="width:${u.pct}%"></div></div>
            <div class="flex-between text-sm text-muted mt-1"><span>${u.done}/${u.total} 掌握</span><span>${u.errors} 错题</span></div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ============ Search ============
let searchTimeout;
function renderSearch() {
  const el = document.getElementById('tab-search');
  el.innerHTML = `
    <h2 style="font-size:1.5rem;margin-bottom:16px">🔍 全局搜索</h2>
    <input type="text" class="search-box" id="searchInput" placeholder="输入英文单词或中文意思搜索..." oninput="doSearch()" autofocus>
    <div id="searchResults" class="search-results">
      <p class="text-muted text-center">输入关键词开始搜索 ${VOCAB_RAW.length} 个词汇</p>
    </div>
  `;
}

function doSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = document.getElementById('searchInput')?.value?.trim().toLowerCase();
    const resultsEl = document.getElementById('searchResults');
    if (!resultsEl) return;

    if (!q) {
      resultsEl.innerHTML = '<p class="text-muted text-center">输入关键词开始搜索</p>';
      return;
    }

    const results = VOCAB_RAW.filter(v =>
      v.w.toLowerCase().includes(q) ||
      v.m.includes(q) ||
      v.c.some(c => c[0].toLowerCase().includes(q) || c[1].includes(q))
    ).slice(0, 50);

    if (results.length === 0) {
      resultsEl.innerHTML = '<p class="text-muted text-center">未找到匹配的词汇</p>';
      return;
    }

    resultsEl.innerHTML = results.map(v => `
      <div class="search-item" onclick="showWordDetailDirect('${v.w}')">
        <div>
          <span class="sword">${highlightMatch(v.w, q)}</span>
          <span class="badge badge-primary">${v.p}</span>
          <span class="smeaning">${highlightMatch(v.m, q)}</span>
        </div>
        <div class="scollocs">${v.c.slice(0,3).map(c=>highlightMatch(c[0]+' '+c[1], q)).join(' | ')}${v.c.length>3?' ...':''}</div>
      </div>
    `).join('');
  }, 300);
}

function highlightMatch(text, q) {
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<mark style="background:var(--accent-light);padding:1px 2px;border-radius:2px">' + text.slice(idx, idx+q.length) + '</mark>' + text.slice(idx+q.length);
}

function showWordDetailDirect(wordKey) {
  const w = VOCAB_RAW.find(v => wk(v) === wk(wordKey));
  if (!w) return;
  const errors = Store.get('errors');
  const err = errors[wk(w)];

  const overlay = document.getElementById('modalOverlay');
  const box = document.getElementById('modalBox');
  box.innerHTML = `
    <h3>📋 ${w.w} <span class="badge badge-primary">${w.p}</span></h3>
    <p><strong>释义：</strong>${w.m}</p>
    ${err ? `<p><strong>错题记录：</strong>错误 <span class="badge badge-danger">${err.count}</span> 次</p>` : ''}
    ${w.c && w.c.length ? `
      <div style="margin-top:12px">
        <strong>固定搭配：</strong>
        ${w.c.map(c => `<div style="padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--primary);font-weight:500">${c[0]}</span> — ${c[1]}</div>`).join('')}
      </div>
    ` : ''}
    <div class="flex-row mt-2">
      <button class="btn btn-primary" onclick="document.getElementById('modalOverlay').style.display='none'">关闭</button>
      <button class="btn btn-outline btn-sm" onclick="markWord('${wk(w)}','mastered');document.getElementById('modalOverlay').style.display='none'">✅ 标记已掌握</button>
    </div>
  `;
  overlay.style.display = 'flex';
}

// ============ Settings Modal ============
function showSettings() {
  const settings = Store.get('settings');
  const overlay = document.getElementById('modalOverlay');
  const box = document.getElementById('modalBox');
  box.innerHTML = `
    <h3>⚙️ 设置</h3>
    <div class="setting-row">
      <span>🌓 深色模式</span>
      <div class="toggle-switch ${settings.theme==='dark'?'on':''}" onclick="toggleTheme()" id="themeSwitch"></div>
    </div>
    <div class="setting-row">
      <span>📝 每日学习词汇量</span>
      <select onchange="updateDailyWords(this.value)" style="width:100px">
        <option value="20" ${settings.dailyWords===20?'selected':''}>20词</option>
        <option value="28" ${settings.dailyWords===28?'selected':''}>28词</option>
        <option value="35" ${settings.dailyWords===35?'selected':''}>35词</option>
        <option value="50" ${settings.dailyWords===50?'selected':''}>50词</option>
      </select>
    </div>
    <div class="setting-row">
      <span>📤 导出学习数据</span>
      <button class="btn btn-sm btn-outline" onclick="exportData()">导出 JSON</button>
    </div>
    <div class="setting-row">
      <span>📥 导入学习数据</span>
      <button class="btn btn-sm btn-outline" onclick="document.getElementById('importFile').click()">导入 JSON</button>
      <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
    </div>
    <div class="setting-row">
      <span style="color:var(--danger)">🗑 重置所有进度</span>
      <button class="btn btn-sm btn-danger" onclick="resetAll()">重置</button>
    </div>
    <button class="btn btn-primary mt-2" style="width:100%" onclick="document.getElementById('modalOverlay').style.display='none'">关闭</button>
  `;
  overlay.style.display = 'flex';
}

function toggleTheme() {
  const settings = Store.get('settings');
  settings.theme = settings.theme === 'dark' ? 'light' : 'dark';
  Store.set('settings', settings);
  document.body.setAttribute('data-theme', settings.theme);
  const sw = document.getElementById('themeSwitch');
  if (sw) sw.classList.toggle('on');
}

function updateDailyWords(n) {
  const settings = Store.get('settings');
  settings.dailyWords = parseInt(n);
  Store.set('settings', settings);
  showToast('每日词汇量已更新','success');
}

function exportData() {
  const data = {
    progress: Store.get('progress'),
    errors: Store.get('errors'),
    checkins: Store.get('checkins'),
    testHistory: Store.get('testHistory'),
    settings: Store.get('settings'),
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'vocab-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出','success');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.progress) Store.set('progress', data.progress);
      if (data.errors) Store.set('errors', data.errors);
      if (data.checkins) Store.set('checkins', data.checkins);
      if (data.testHistory) Store.set('testHistory', data.testHistory);
      if (data.settings) Store.set('settings', data.settings);
      // Apply theme
      document.body.setAttribute('data-theme', data.settings?.theme || 'light');
      showToast('数据导入成功！','success');
      switchTab('dashboard');
    } catch(err) {
      showToast('导入失败：文件格式错误','error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function resetAll() {
  if (confirm('确定要重置所有学习进度、错题记录和打卡数据吗？\n\n⚠️ 此操作不可撤销！')) {
    Store.remove('progress');
    Store.remove('errors');
    Store.remove('checkins');
    Store.remove('testHistory');
    initStore();
    showToast('所有数据已重置','info');
    switchTab('dashboard');
  }
}

// ============ Initialization ============
function init() {
  initStore();

  // Apply theme
  const settings = Store.get('settings');
  document.body.setAttribute('data-theme', settings.theme || 'light');

  // Tab navigation
  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
  document.querySelectorAll('.mnav-tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // Theme toggle button
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);

  // Settings button
  document.getElementById('settingsBtn').addEventListener('click', showSettings);

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    switch(e.key) {
      case '1': switchTab('dashboard'); break;
      case '2': switchTab('study'); break;
      case '3': switchTab('dictation'); break;
      case '4': switchTab('errors'); break;
      case '5': switchTab('plan'); break;
      case '6': switchTab('stats'); break;
      case '7': switchTab('search'); break;
    }
  });

  // Initial render
  switchTab('dashboard');
}

// Boot
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
